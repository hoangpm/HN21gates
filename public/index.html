<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Hanoi 21 gates in 1831 map by Phạm Minh Hoàng (hoangpm@gmail.com) 2024-2026</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />

  <style>
    .about-trigger {
      position: absolute;
      top: 83px;
      left: 18px;
      z-index: 1000;

      background: white;
      border: 2px solid rgba(0, 0, 0, 0.2);
      border-radius: 4px;
      padding: 4px 8px;

      font-family: "Helvetica Neue", Arial, Helvetica, sans-serif;
      font-size: 17px;
      font-weight: bold;
      line-height: 1;

      cursor: pointer;
      user-select: none;
    }

    .about-trigger:hover {
      background: #f4f4f4;
    }

    .about-box {
      display: none;
      position: absolute;
      top: 121px;
      left: 18px;
      z-index: 1000;

      background: white;
      border: 2px solid rgba(0, 0, 0, 0.2);
      border-radius: 4px;
      padding: 10px 12px;

      font-family: "Helvetica Neue", Arial, Helvetica, sans-serif;
      
      font-size: 12px;
      font-weight: 400;
      line-height: 1.5;
      
      color: #333;
      
      text-align: center;
      
      box-shadow: 0 1px 5px rgba(0, 0, 0, 0.35);

      border-radius: 2;
    }

    .about-box a {
      color: #0078A8;
      text-decoration: none;
    }

    .about-box a:hover {
      text-decoration: underline;
    }
    
    .about-box.show {
      display: block;
    }

    .about-author {
      margin-bottom: 8px;
      white-space: nowrap;
    }

    .about-icons {
      display: flex;
      gap: 10px;
      align-items: center;

      justify-content: center;
    }

    .about-icons img {
      width: 20px;
      height: 20px;
      object-fit: contain;
      display: block;
    }
    
    .about-icons a {
      text-decoration: none;
      font-size: 18px;
      color: #333;
    }

    .about-icons a:hover {
      opacity: 0.7;
    }
  </style>
</head>

<body>
  <div id="map"></div>

  <div class="about-trigger" id="aboutTrigger">...</div>

  <div class="about-box" id="aboutBox">
    <div class="about-author">
      <span>Tác giả:</span>
      
      <a href="https://www.facebook.com/phamminhhoang" target="_blank" rel="noopener noreferrer">
        <span>Phạm Minh Hoàng</span>
      </a>

      <span>| Chuỗi nghiên cứu cửa ô Hà Nội (2024 - 2026)</span>
    </div>

    <div class="about-icons">
      <a href="mailto:hoangpm@gmail.com" title="Email">
        <img src="gmail.png" alt="Gmail" />
      </a>
 
      <a href="https://github.com/hoangpm/HN21gates" target="_blank" rel="noopener noreferrer" title="GitHub">
        <img src="github.ico" alt="Github" />
      </a>
      
      <a href="https://zenodo.org/search?q=%22c%E1%BB%ADa%20%C3%B4%22&f=subject%3AH%C3%A0%20N%E1%BB%99i&l=list&p=1&s=10&sort=mostviewed" target="_blank" rel="noopener noreferrer" title="Zenodo">
        <img src="zenodo.png" alt="Zenodo" />
      </a>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="index.js"></script>

  <script>
    const aboutTrigger = document.getElementById("aboutTrigger");
    const aboutBox = document.getElementById("aboutBox");

    aboutTrigger.addEventListener("click", function (event) {
      event.stopPropagation();
      aboutBox.classList.toggle("show");
    });

    document.addEventListener("click", function () {
      aboutBox.classList.remove("show");
    });

    aboutBox.addEventListener("click", function (event) {
      event.stopPropagation();
    });
  </script>
</body>
</html>
