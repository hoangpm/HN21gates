<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Hanoi 21 gates in 1831 map by Phạm Minh Hoàng (hoangpm@gmail.com) 2024-2026</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />

  <style>
    .about-trigger {
      position: absolute;
      top: 83px;
      left: 17px;
      z-index: 1000;

      background: white;
      border: 2px solid rgba(0, 0, 0, 0.2);
      border-radius: 4px;
      padding: 4px 8px;

      font-family: "Helvetica Neue", Arial, Helvetica, sans-serif;
      font-size: 17px;
      font-weight: bold;
      line-height: 1;

      cursor: pointer;
      user-select: none;
    }

    .about-trigger:hover {
      background: #f4f4f4;
    }

    .about-box {
      display: none;
      position: absolute;
      top: 48px;
      left: 50px;
      z-index: 1000;

      background: white;
      border: 2px solid rgba(0, 0, 0, 0.2);
      border-radius: 4px;
      padding: 10px 12px;

      font-family: "Helvetica Neue", Arial, Helvetica, sans-serif;
      font-size: 13px;
      color: #333;

      box-shadow: 0 1px 5px rgba(0, 0, 0, 0.35);
    }

    .about-box.show {
      display: block;
    }

    .about-author {
      margin-bottom: 8px;
      white-space: nowrap;
    }

    .about-icons {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .about-icons a {
      text-decoration: none;
      font-size: 18px;
      color: #333;
    }

    .about-icons a:hover {
      opacity: 0.7;
    }
  </style>
</head>

<body>
  <div id="map"></div>

  <div class="about-trigger" id="aboutTrigger">...</div>

  <div class="about-box" id="aboutBox">
    <div class="about-author">Author: Phạm Minh Hoàng</div>

    <div class="about-icons">
      <a href="mailto:hoangpm@gmail.com" title="Email">✉️</a>
      <a href="https://www.facebook.com/phamminhhoang" target="_blank" rel="noopener noreferrer" title="Facebook">f</a>
      <a href="https://github.com/hoangpm/HN21gates" target="_blank" rel="noopener noreferrer" title="GitHub">🐙</a>
      <a href="https://zenodo.org" target="_blank" rel="noopener noreferrer" title="Zenodo">Z</a>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="index.js"></script>

  <script>
    const aboutTrigger = document.getElementById("aboutTrigger");
    const aboutBox = document.getElementById("aboutBox");

    aboutTrigger.addEventListener("click", function (event) {
      event.stopPropagation();
      aboutBox.classList.toggle("show");
    });

    document.addEventListener("click", function () {
      aboutBox.classList.remove("show");
    });

    aboutBox.addEventListener("click", function (event) {
      event.stopPropagation();
    });
  </script>
</body>
</html>
